[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Netlify Function: 실시간 API 프록시
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 정적 데이터 파일은 캐시 1시간
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
